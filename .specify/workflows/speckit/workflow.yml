schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Full SDD Cycle"
  version: "1.3.0"
  author: "GitHub"
  description: "Runs specify → plan → tasks → implement → remediate (opt) → pr-review → remediate (opt) → sync-docs → merge with review gates"

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only"]

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: remediate-pre-pr
    type: gate
    message: "Optional: run /speckit-remediate to fix issues before opening a PR (paste /speckit-analyze findings or run it after reviewing the analyze output). Skip to proceed directly to PR."
    options: [remediated, skip]
    on_remediated: continue
    on_skip: continue

  - id: review-implementation
    type: gate
    message: "Push the branch and open a pull request before running pr-review."
    options: [pr-opened, skip]
    on_skip: continue

  - id: pr-review
    command: speckit.pr.review
    integration: "{{ inputs.integration }}"
    input:
      args: ""

  - id: remediate-post-review
    type: gate
    message: "Optional: run /speckit-remediate to fix findings from the PR review (it auto-fetches the latest pr-review comment). Skip to proceed."
    options: [remediated, skip]
    on_remediated: continue
    on_skip: continue

  - id: sync-docs
    command: argos.sync.docs
    integration: "{{ inputs.integration }}"
    input:
      args: ""

  - id: ready-to-merge
    type: gate
    message: "Docs are synced. Merge the pull request when ready."
    options: [merged, skip]
    on_merged: continue
    on_skip: continue
