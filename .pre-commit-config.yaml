repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: dprint
        name: dprint fmt (markdown)
        entry: dprint fmt --allow-no-files
        language: system
        types: [markdown]
        exclude: ^(\.claude/|\.specify/)
        stages: [pre-commit]

      - id: claude-sensitive-data-check
        name: Check for sensitive data (Claude)
        entry: scripts/check-sensitive-data.sh
        language: script
        stages: [pre-commit]

      - id: sync-extension-registry
        name: Sync .specify/extensions/.registry manifest_hash
        entry: scripts/sync-extension-registry.py
        language: script
        files: ^\.specify/extensions/[^/]+/extension\.yml$
        pass_filenames: true
        stages: [pre-commit]
